<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="card-title justify-center text-3xl text-primary">Sign Up</div>
    <div class="card-body w-full">
        <form #registerForm="ngForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email</span>
                </label>
                <input type="email" name="email" [(ngModel)]="creds.email" required class="input w-full" placeholder="Email"/>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Password</span>
                </label>
                <input type="password" name="password" [(ngModel)]="creds.password" required class="input w-full" placeholder="Password"/>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Display Name</span>
                </label>
                <input type="text" name="displayName" [(ngModel)]="creds.displayName" required class="input w-full" placeholder="Display Name"/>
            </div>
            <div class="flex items-center justify-end gap-3">
                <button type="button" class="btn" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>
    </div>

</div>
